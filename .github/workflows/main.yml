name: Cheon-Bot-Start

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          # حذفنا سطر الـ cache من هنا لحل المشكلة

      - name: Install Dependencies
        run: npm install

      - name: Start Cheon Bot
        run: npm start
